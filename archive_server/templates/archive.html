{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Архив</h1>

<div class="camera-filter">
    <a href="/archive" class="chip {{ 'active' if not selected_camera else '' }}">Все камеры</a>
    {% for cam in cameras %}
    <a href="/archive?camera={{ cam }}" class="chip {{ 'active' if selected_camera == cam else '' }}">{{ cam }}</a>
    {% endfor %}
</div>

{% if selected_camera %}
<div class="camera-actions">
    <button class="action-btn" hx-post="/control/{{ selected_camera }}/alarm-on" hx-swap="none">Тревога ВКЛ</button>
    <button class="action-btn" hx-post="/control/{{ selected_camera }}/alarm-off" hx-swap="none">Тревога ВЫКЛ</button>
    <button class="action-btn" hx-post="/control/{{ selected_camera }}/photo" hx-swap="none">Снимок</button>
    <button class="action-btn" hx-post="/control/{{ selected_camera }}/record" hx-swap="none">Запись</button>
</div>
{% endif %}

<div class="media-grid" id="grid">
    {% include "_media_grid.html" %}
</div>
{% if not items %}<p class="empty">Нет файлов</p>{% endif %}
{% endblock %}
