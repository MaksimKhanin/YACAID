<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>{{ title or "YACAID Архив" }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    <header class="topbar">
        <span class="brand">YACAID</span>
        <form action="/logout" method="post" class="logout-form">
            <button type="submit" class="link-btn">Выйти</button>
        </form>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
        {% for item in nav_items %}
        <a href="{{ item.url }}" class="{{ 'active' if active_tab == item.slug else '' }}">
            <span class="icon">{{ item.icon }}</span><span>{{ item.label }}</span>
        </a>
        {% endfor %}
    </nav>
</body>
</html>
